{% extends "base.html" %}
{% block title %}Sectores - CellTrack{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 style="color: var(--ct-blue);"><i class="fas fa-building"></i> Sectores</h4>
    <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevo">
        <i class="fas fa-plus"></i> Nuevo
    </button>
</div>

<div class="card" style="max-width: 500px;">
    <div class="card-body p-0">
        <table class="table table-sm mb-0">
            <thead><tr><th>#</th><th>Sector</th></tr></thead>
            <tbody>
            {% for s in sectores %}
            <tr>
                <td class="text-muted small">{{ s.idsector }}</td>
                <td>{{ s.sector.strip() }}</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalNuevo" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <form method="POST" action="{{ url_for('catalogos.nuevo_sector') }}">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Nuevo sector</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="text" name="sector" class="form-control text-uppercase"
                           placeholder="Nombre del sector" required autofocus>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success btn-sm">Guardar</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
