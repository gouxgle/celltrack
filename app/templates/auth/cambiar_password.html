{% extends "base.html" %}
{% block title %}Cambiar Contraseña - CellTrack{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-3">
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left"></i>
    </a>
    <h4 class="mb-0"><i class="fas fa-key"></i> Cambiar contraseña</h4>
</div>

<div class="card" style="max-width: 420px;">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Contraseña actual</label>
                <input type="password" name="actual" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Nueva contraseña</label>
                <input type="password" name="nueva" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Confirmar nueva contraseña</label>
                <input type="password" name="confirmar" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-save"></i> Cambiar contraseña
            </button>
        </form>
    </div>
</div>
{% endblock %}
