<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellTrack - REFSA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%); min-height: 100vh; display: flex; align-items: center; }
    </style>
</head>
<body>
<div class="container" style="max-width: 400px;">
    <div class="card shadow-lg">
        <div class="card-header text-white text-center py-4" style="background: #0d47a1;">
            <i class="fas fa-mobile-alt fa-2x mb-2"></i>
            <h4 class="mb-0">CellTrack</h4>
            <small class="opacity-75">REFSA — Gestión de Celulares</small>
        </div>
        <div class="card-body p-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="usuario" class="form-control" autofocus required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt me-1"></i> Ingresar
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
