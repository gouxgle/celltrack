{% extends "base.html" %}
{% block title %}{{ 'Editar' if resp else 'Nuevo' }} Responsable - CellTrack{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-3">
    <a href="{{ url_for('responsables.lista') }}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left"></i>
    </a>
    <h4 class="mb-0" style="color: var(--ct-blue);">
        <i class="fas fa-user"></i>
        {{ 'Editar Responsable' if resp else 'Nuevo Responsable' }}
    </h4>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Nombre completo <span class="text-danger">*</span></label>
                <input type="text" name="responsable" class="form-control text-uppercase"
                       value="{{ resp.responsable.strip() if resp else '' }}"
                       required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Localidad <span class="text-danger">*</span></label>
                <select name="idlocalidad" class="form-select select2" required>
                    <option value="">Seleccionar...</option>
                    {% for l in localidades %}
                    <option value="{{ l.idlocalidad }}"
                            {% if resp and resp.idlocalidad == l.idlocalidad %}selected{% endif %}>
                        {{ l.localidad.strip() }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Sector <span class="text-danger">*</span></label>
                <select name="idsector" class="form-select select2" required>
                    <option value="">Seleccionar...</option>
                    {% for s in sectores %}
                    <option value="{{ s.idsector }}"
                            {% if resp and resp.idsector == s.idsector %}selected{% endif %}>
                        {{ s.sector.strip() }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Guardar
                </button>
                <a href="{{ url_for('responsables.ver', id=resp.idresponsable) if resp else url_for('responsables.lista') }}"
                   class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$('.select2').select2({ theme: 'bootstrap-5', width: '100%' });
</script>
{% endblock %}
