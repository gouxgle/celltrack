<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellTrack - REFSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 50%, #f5f0ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Particle canvas */
        #ct-particles {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .ct-login-wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            padding: 0 20px;
        }

        /* Logo */
        .ct-logo-area { text-align: center; margin-bottom: 28px; }
        .ct-logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #0d47a1, #00b4d8);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            box-shadow: 0 0 32px rgba(0,180,216,.35);
        }
        .ct-logo-icon i { color: #fff; font-size: 28px; }
        .ct-logo-refsa  { font-size: .72rem; font-weight: 700; color: #00b4d8; letter-spacing: .14em; text-transform: uppercase; margin-bottom: 4px; }
        .ct-logo-title  { font-size: 1.9rem; font-weight: 900; color: #0d1b2e; letter-spacing: -.02em; margin: 0; }
        .ct-logo-sub    { font-size: .82rem; color: #64748b; margin: 4px 0 0; }

        /* Card */
        .ct-login-card {
            background: rgba(255,255,255,.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(13,71,161,.12);
            border: 1px solid rgba(255,255,255,.9);
            padding: 32px 28px;
        }

        /* Form fields */
        .ct-field-label {
            display: block;
            font-size: .74rem; font-weight: 700;
            color: #475569;
            text-transform: uppercase; letter-spacing: .06em;
            margin-bottom: 6px;
        }
        .ct-input-wrap { position: relative; margin-bottom: 16px; }
        .ct-input-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #94a3b8; font-size: .85rem;
            pointer-events: none;
        }
        .ct-input {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 11px 12px 11px 38px;
            font-size: .9rem;
            font-family: inherit;
            outline: none;
            background: #f8fafc;
            transition: border-color .2s, box-shadow .2s;
            color: #0d1b2e;
        }
        .ct-input:focus {
            border-color: #00b4d8;
            box-shadow: 0 0 0 3px rgba(0,180,216,.12);
            background: #fff;
        }

        /* Submit button */
        .ct-submit {
            width: 100%;
            background: linear-gradient(135deg, #0d47a1, #00b4d8);
            color: #fff; border: none;
            border-radius: 10px; padding: 12px;
            font-size: .95rem; font-weight: 700;
            font-family: inherit; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,180,216,.35);
            transition: opacity .15s, transform .15s;
            margin-top: 8px;
        }
        .ct-submit:hover { opacity: .92; transform: translateY(-1px); }
        .ct-submit:active { transform: translateY(0); }

        /* Footer */
        .ct-login-footer { text-align: center; color: rgba(255,255,255,.45); font-size: .72rem; margin-top: 20px; }
    </style>
</head>
<body>

<canvas id="ct-particles"></canvas>

<div class="ct-login-wrap">
    <!-- Logo -->
    <div class="ct-logo-area">
        <div class="ct-logo-icon"><i class="fas fa-sim-card"></i></div>
        <div class="ct-logo-refsa">REFSA</div>
        <h1 class="ct-logo-title">CellTrack</h1>
        <p class="ct-logo-sub">Gestión de Celulares y SIM</p>
    </div>

    <!-- Card -->
    <div class="ct-login-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 mb-3" style="border-radius:8px; font-size:.84rem;">
                <i class="fas fa-exclamation-circle me-1"></i>{{ msg }}
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <label class="ct-field-label">Usuario</label>
            <div class="ct-input-wrap">
                <i class="fas fa-user"></i>
                <input type="text" name="usuario" class="ct-input"
                       placeholder="tu.usuario" autofocus required>
            </div>

            <label class="ct-field-label" style="margin-top:4px;">Contraseña</label>
            <div class="ct-input-wrap" style="margin-bottom:24px;">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="ct-input"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="ct-submit">
                <i class="fas fa-arrow-right me-2"></i>Ingresar
            </button>
        </form>
    </div>

    <div class="ct-login-footer">CellTrack v2.0 &middot; REFSA &copy; 2024</div>
</div>

<script>
/* ── Particle network animation ─────────────────────────────────── */
(function() {
    const canvas = document.getElementById('ct-particles');
    const ctx    = canvas.getContext('2d');
    let animId;

    function resize() {
        canvas.width  = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COUNT = 60;
    const pts = Array.from({ length: COUNT }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - .5) * .4,
        vy: (Math.random() - .5) * .4,
        r:  Math.random() * 2.5 + 1,
    }));

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pts.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width)  p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,180,216,.45)';
            ctx.fill();
        });
        for (let i = 0; i < pts.length; i++) {
            for (let j = i + 1; j < pts.length; j++) {
                const dx = pts[i].x - pts[j].x;
                const dy = pts[i].y - pts[j].y;
                const d  = Math.sqrt(dx*dx + dy*dy);
                if (d < 110) {
                    ctx.beginPath();
                    ctx.moveTo(pts[i].x, pts[i].y);
                    ctx.lineTo(pts[j].x, pts[j].y);
                    ctx.strokeStyle = `rgba(0,180,216,${.15 * (1 - d/110)})`;
                    ctx.lineWidth = .8;
                    ctx.stroke();
                }
            }
        }
        animId = requestAnimationFrame(draw);
    }
    draw();
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
